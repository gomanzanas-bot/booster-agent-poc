<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>GoManzanas</title>
    <script>
      // GitHub Pages 404 → SPA redirect trick.
      // When someone refreshes /booster-agent-poc/about, GitHub can't find that
      // file and serves this 404.html instead. This script encodes the path into
      // a query string and bounces back to index.html, which then restores it.
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
