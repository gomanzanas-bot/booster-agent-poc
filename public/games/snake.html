<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNAKE — ARCADE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens (shared across all game pages) ────────── */
    :root {
      --bg:           #0a0a0f;
      --canvas-bg:    #0d0d1a;
      --card-bg:      #12122a;
      --border:       #2a2a4a;
      --neon-green:   #39ff14;
      --neon-cyan:    #00f5ff;
      --neon-magenta: #ff00ff;
      --neon-yellow:  #ffff00;
      --neon-orange:  #ff8c00;
      --neon-red:     #ff4444;
      --text:         #e8e8ff;
      --text-dim:     #6666aa;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Press Start 2P', cursive;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* Scanline overlay — decorative atmosphere, doesn't block input */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.12) 2px,
        rgba(0, 0, 0, 0.12) 4px
      );
    }

    /* Back link — fixed top-left, consistent across all game pages */
    .back-link {
      position: fixed;
      top: 12px;
      left: 16px;
      font-size: 0.5rem;
      color: var(--text-dim);
      text-decoration: none;
      z-index: 1001;
    }

    .back-link:hover {
      color: var(--text);
    }

    /* Score bar — sits directly above the canvas */
    .ui-bar {
      width: 400px;
      height: 40px;
      background: var(--card-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 0.6rem;
    }

    .ui-bar .label { color: var(--text-dim); }
    .ui-bar .value { color: var(--text); }

    /* Canvas */
    #gameCanvas {
      display: block;
      border: 2px solid var(--border);
      background: var(--canvas-bg);
    }

    #gameCanvas:hover,
    #gameCanvas:focus {
      box-shadow: 0 0 24px rgba(57, 255, 20, 0.2);
      outline: none;
    }
  </style>
</head>
<body>

  <a class="back-link" href="../index.html">← HOME</a>

  <div class="ui-bar">
    <div>
      <span class="label">SCORE </span>
      <span class="value" id="scoreDisplay">0</span>
    </div>
    <div>
      <span class="label">BEST </span>
      <span class="value" id="highScoreDisplay">0</span>
    </div>
  </div>

  <canvas id="gameCanvas" width="400" height="400" tabindex="0"></canvas>

  <script>
    // ── Constants ────────────────────────────────────────────────
    const COLS = 20;
    const ROWS = 20;
    const CELL = 20; // each cell is 20x20px, matching the 400px canvas

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('scoreDisplay');
    const highScoreEl = document.getElementById('highScoreDisplay');

    // ── State ────────────────────────────────────────────────────
    // game state: 'START' | 'PLAYING' | 'GAME_OVER'
    let state = 'START';
    let snake = [];                          // [{x, y}, ...], head is index 0
    let food = null;                         // {x, y}
    let currentDirection = { x: 1, y: 0 }; // initially moving RIGHT
    let pendingDirection = { x: 1, y: 0 }; // input buffer: at most 1 queued turn
    let score = 0;
    let foodEaten = 0;
    let highScore = parseInt(localStorage.getItem('snake_highscore') || '0', 10);
    let gameTimer = null;
    let foodVisible = true;

    // Food blink: toggles every 500ms independent of the game tick
    setInterval(() => { foodVisible = !foodVisible; }, 500);

    // ── Speed formula ─────────────────────────────────────────────
    // 150ms at 0 food, steps down 10ms per 5 food eaten, floors at 60ms
    function getInterval() {
      return Math.max(60, 150 - Math.floor(foodEaten / 5) * 10);
    }

    // ── Food placement ──────────────────────────────────────────
    // Picks a random cell not occupied by the snake.
    // Returns null (and triggers game over) if the board is completely full.
    function spawnFood() {
      const occupied = new Set(snake.map(s => s.x + ',' + s.y));
      const empty = [];
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          if (!occupied.has(x + ',' + y)) empty.push({ x, y });
        }
      }
      if (empty.length === 0) {
        // Edge case: board full — player wins/game ends
        transitionToGameOver();
        return null;
      }
      return empty[Math.floor(Math.random() * empty.length)];
    }

    // ── Game initialisation ──────────────────────────────────────
    function initGame() {
      // Snake starts at centre: head (10,10), body (9,10), (8,10) — 3 cells, direction RIGHT
      snake = [
        { x: 10, y: 10 },
        { x: 9,  y: 10 },
        { x: 8,  y: 10 },
      ];
      currentDirection = { x: 1, y: 0 };
      pendingDirection = { x: 1, y: 0 };
      score = 0;
      foodEaten = 0;
      scoreEl.textContent = '0';
      food = spawnFood();
    }

    // ── State transitions ───────────────────────────────────────
    function transitionToPlaying() {
      state = 'PLAYING';
      initGame();
      clearInterval(gameTimer);
      gameTimer = setInterval(gameTick, getInterval());
    }

    function transitionToGameOver() {
      state = 'GAME_OVER';
      clearInterval(gameTimer);
      gameTimer = null;
      // Persist high score
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snake_highscore', String(highScore));
        highScoreEl.textContent = String(highScore);
      }
      renderGameOver();
    }

    // ── Game tick (runs on setInterval) ─────────────────────────
    function gameTick() {
      if (state !== 'PLAYING') return;

      // 1. Flush the buffered direction
      currentDirection = pendingDirection;

      // 2. Compute new head position
      const head = snake[0];
      const newHead = {
        x: head.x + currentDirection.x,
        y: head.y + currentDirection.y,
      };

      // 3. Wall collision check — no wrapping
      if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
        transitionToGameOver();
        return;
      }

      // 4. Self-collision check
      for (const seg of snake) {
        if (seg.x === newHead.x && seg.y === newHead.y) {
          transitionToGameOver();
          return;
        }
      }

      // 5. Prepend new head
      snake.unshift(newHead);

      // 6. Food check
      if (food && newHead.x === food.x && newHead.y === food.y) {
        // Ate food: grow (no tail pop), update score, respawn food, maybe speed up
        score += 10;
        foodEaten += 1;
        scoreEl.textContent = String(score);

        const prevInterval = Math.max(60, 150 - Math.floor((foodEaten - 1) / 5) * 10);
        const newInterval = getInterval();
        if (newInterval !== prevInterval) {
          // Speed changed — restart the timer at the new rate
          clearInterval(gameTimer);
          gameTimer = setInterval(gameTick, newInterval);
        }

        food = spawnFood(); // spawnFood handles board-full edge case
      } else {
        // No food eaten — remove tail to keep length constant
        snake.pop();
      }

      // 7. Draw the updated frame
      render();
    }

    // ── Render: normal game frame ──────────────────────────────
    function render() {
      // Clear canvas
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(0, 0, 400, 400);

      // Subtle grid lines
      ctx.strokeStyle = '#1a1a2e';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * CELL, 0);
        ctx.lineTo(x * CELL, 400);
        ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * CELL);
        ctx.lineTo(400, y * CELL);
        ctx.stroke();
      }

      // Food — only drawn when foodVisible (blink)
      if (foodVisible && food) {
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#ffff00';
        ctx.fillRect(food.x * CELL + 3, food.y * CELL + 3, 14, 14);
      }

      // Snake body (all segments except head)
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#1a8a0a';
      for (let i = 1; i < snake.length; i++) {
        const seg = snake[i];
        ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, 18, 18);
      }

      // Snake head — brighter green with a neon glow
      const head = snake[0];
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#39ff14';
      ctx.fillStyle = '#39ff14';
      ctx.fillRect(head.x * CELL + 1, head.y * CELL + 1, 18, 18);
      // Always reset shadow after use to avoid bleeding onto other draws
      ctx.shadowBlur = 0;
      ctx.shadowColor = 'transparent';
    }

    // ── Render: START screen ──────────────────────────────────
    function renderStart() {
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(0, 0, 400, 400);

      // Static 3-cell snake stub at centre
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#1a8a0a';
      ctx.fillRect(9 * CELL + 1, 10 * CELL + 1, 18, 18);
      ctx.fillRect(8 * CELL + 1, 10 * CELL + 1, 18, 18);

      ctx.shadowBlur = 8;
      ctx.shadowColor = '#39ff14';
      ctx.fillStyle = '#39ff14';
      ctx.fillRect(10 * CELL + 1, 10 * CELL + 1, 18, 18);
      ctx.shadowBlur = 0;
      ctx.shadowColor = 'transparent';

      // Game title
      ctx.fillStyle = '#39ff14';
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#39ff14';
      ctx.font = '20px "Press Start 2P", cursive';
      ctx.textAlign = 'center';
      ctx.fillText('SNAKE', 200, 155);
      ctx.shadowBlur = 0;
      ctx.shadowColor = 'transparent';

      // Prompt
      ctx.fillStyle = '#e8e8ff';
      ctx.font = '8px "Press Start 2P", cursive';
      ctx.textAlign = 'center';
      ctx.fillText('PRESS ENTER TO START', 200, 240);
    }

    // ── Render: GAME OVER overlay ────────────────────────────
    // Drawn on top of the final frozen game frame.
    function renderGameOver() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, 400, 400);

      ctx.fillStyle = '#ff4444';
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#ff4444';
      ctx.font = '16px "Press Start 2P", cursive';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', 200, 155);
      ctx.shadowBlur = 0;
      ctx.shadowColor = 'transparent';

      ctx.fillStyle = '#e8e8ff';
      ctx.font = '10px "Press Start 2P", cursive';
      ctx.fillText('SCORE: ' + score, 200, 195);

      ctx.fillStyle = '#6666aa';
      ctx.font = '7px "Press Start 2P", cursive';
      ctx.fillText('PRESS ENTER TO RESTART', 200, 245);
    }

    // ── Keyboard input ──────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      // Prevent arrow keys and space from scrolling the page
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
        e.preventDefault();
      }

      if (state === 'START' || state === 'GAME_OVER') {
        if (e.key === 'Enter' || e.key === ' ') {
          transitionToPlaying();
        }
        return;
      }

      if (state === 'PLAYING') {
        // Validate against pendingDirection (not currentDirection) to allow
        // queuing the next turn before the current tick fires, while still
        // blocking a 180° reversal.
        switch (e.key) {
          case 'ArrowUp':
          case 'w': case 'W':
            if (pendingDirection.y !== 1) pendingDirection = { x: 0, y: -1 };
            break;
          case 'ArrowDown':
          case 's': case 'S':
            if (pendingDirection.y !== -1) pendingDirection = { x: 0, y: 1 };
            break;
          case 'ArrowLeft':
          case 'a': case 'A':
            if (pendingDirection.x !== 1) pendingDirection = { x: -1, y: 0 };
            break;
          case 'ArrowRight':
          case 'd': case 'D':
            if (pendingDirection.x !== -1) pendingDirection = { x: 1, y: 0 };
            break;
        }
      }
    });

    // ── Bootstrap ───────────────────────────────────────────────
    // Populate UI bar with persisted high score
    highScoreEl.textContent = String(highScore);

    // Wait for the web font to be available before using it on the canvas.
    // Canvas ignores CSS font-face loading — it only sees fonts that the
    // browser has already parsed and decoded.
    document.fonts.ready.then(() => {
      renderStart();
    });
  </script>
</body>
</html>
